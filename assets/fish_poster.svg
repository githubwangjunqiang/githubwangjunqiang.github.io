<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- 背景渐变：清澈蓝海 -->
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#084b6e" />
      <stop offset="100%" stop-color="#021520" />
    </radialGradient>
    
    <!-- 丁达尔光线 -->
    <linearGradient id="ray1" x1="0%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#00c2ff" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#00c2ff" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="ray2" x1="0%" y1="0%" x2="-10%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0" />
    </linearGradient>

    <!-- 灵鱼发光滤镜 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 背景底色 -->
  <rect width="800" height="450" fill="url(#bg)" />

  <!-- 散落的光线 -->
  <polygon points="200,-50 450,500 250,500 50,-50" fill="url(#ray1)" />
  <polygon points="550,-50 750,500 500,500 350,-50" fill="url(#ray2)" />
  <polygon points="0,-50 200,500 50,500 -100,-50" fill="url(#ray1)" />

  <!-- 水波纹交互涟漪 -->
  <g transform="translate(400, 220)">
    <circle r="80" fill="none" stroke="#00c2ff" stroke-width="2" stroke-opacity="0.4" />
    <circle r="150" fill="none" stroke="#00c2ff" stroke-width="1.2" stroke-opacity="0.2" />
    <circle r="250" fill="none" stroke="#00c2ff" stroke-width="0.6" stroke-opacity="0.1" />
  </g>

  <!-- 灵鱼 1：主角，游向右上 -->
  <g transform="translate(370, 230) rotate(-25) scale(1.4)" filter="url(#glow)">
    <!-- 鱼身 -->
    <path d="M0,0 C25,-20 45,-12 60,0 C45,12 25,20 0,0 Z" fill="#00e5ff" opacity="0.9" />
    <!-- 鱼尾 -->
    <path d="M-20,-15 C-5,-5 0,0 0,0 C0,0 -5,5 -20,15 C-12,5 -12,-5 -20,-15 Z" fill="#00e5ff" opacity="0.75" />
    <!-- 鱼鳍 -->
    <path d="M25,-10 C35,-25 45,-20 35,-3 Z" fill="#ffffff" opacity="0.5" />
    <path d="M25,10 C35,25 45,20 35,3 Z" fill="#ffffff" opacity="0.5" />
  </g>

  <!-- 灵鱼 2：伴游，游向左上 -->
  <g transform="translate(520, 160) rotate(-135) scale(0.9)" filter="url(#glow)">
    <path d="M0,0 C20,-15 35,-10 50,0 C35,10 20,15 0,0 Z" fill="#00c2ff" opacity="0.85" />
    <path d="M-15,-12 C-5,-5 0,0 0,0 C0,0 -5,5 -15,12 C-10,5 -10,-5 -15,-12 Z" fill="#00c2ff" opacity="0.65" />
  </g>

  <!-- 灵鱼 3：小鱼，下方穿梭 -->
  <g transform="translate(280, 320) rotate(15) scale(0.7)" filter="url(#glow)">
    <path d="M0,0 C20,-15 35,-10 45,0 C35,10 20,15 0,0 Z" fill="#80e5ff" opacity="0.8" />
    <path d="M-15,-10 C-5,-5 0,0 0,0 C0,0 -5,5 -15,10 C-8,5 -8,-5 -15,-10 Z" fill="#80e5ff" opacity="0.6" />
  </g>

  <!-- 装饰粒子 -->
  <circle cx="200" cy="150" r="3" fill="#ffffff" opacity="0.6" filter="url(#glow)" />
  <circle cx="220" cy="130" r="1.5" fill="#ffffff" opacity="0.4" />
  <circle cx="580" cy="300" r="2" fill="#ffffff" opacity="0.5" filter="url(#glow)" />
  <circle cx="360" cy="360" r="2.5" fill="#ffffff" opacity="0.4" />

  <!-- 标题与排版 -->
  <g transform="translate(400, 390)" text-anchor="middle">
    <text y="0" font-family="ui-serif, 'Songti SC', serif" font-size="32" font-weight="bold" fill="#ffffff" letter-spacing="6" filter="url(#glow)">灵 鱼 壁 纸</text>
    <text y="26" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)" letter-spacing="3">SPIRIT FISH · LIVE INTERACTION</text>
  </g>
</svg>