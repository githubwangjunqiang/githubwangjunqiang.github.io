<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <!-- 与 App 暗色主题对齐：背景 #0A1921，主色 #00C2FF -->
    <radialGradient id="glow" cx="30%" cy="25%" r="85%">
      <stop offset="0%" stop-color="#00C2FF" stop-opacity="0.26"/>
      <stop offset="60%" stop-color="#00C2FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00C2FF" stop-opacity="0.00"/>
    </radialGradient>
    <radialGradient id="glass" cx="38%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </radialGradient>
    <linearGradient id="needle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00C2FF"/>
      <stop offset="100%" stop-color="#ff0000"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="256" height="256" rx="64" fill="#0A1921"/>
  <rect x="22" y="22" width="212" height="212" rx="56" fill="#1A2A33" opacity="0.95"/>
  <rect x="22" y="22" width="212" height="212" rx="56" fill="url(#glow)"/>
  <rect x="22" y="22" width="212" height="212" rx="56" fill="url(#glass)"/>

  <circle cx="128" cy="128" r="86" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="2"/>
  <circle cx="128" cy="128" r="56" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>

  <!-- 刻度 -->
  <g stroke="#ffffff" stroke-opacity="0.12" stroke-width="2">
    <line x1="128" y1="42" x2="128" y2="56"/>
    <line x1="128" y1="200" x2="128" y2="214"/>
    <line x1="42" y1="128" x2="56" y2="128"/>
    <line x1="200" y1="128" x2="214" y2="128"/>
  </g>

  <!-- 指针 -->
  <g transform="translate(128 128) rotate(-18)">
    <rect x="-6" y="-88" width="12" height="176" rx="999" fill="url(#needle)" />
    <circle cx="0" cy="0" r="13" fill="#0A1921" opacity="0.70"/>
    <circle cx="0" cy="0" r="13" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
  </g>
</svg>
